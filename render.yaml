services:
  - type: web
    name: event-management-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ADMIN_REGISTRATION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
